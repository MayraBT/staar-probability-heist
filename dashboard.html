<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Probability Heist — Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f1e8d4;
    --paper-dark: #d9cba8;
    --ink: #1a1410;
    --ink-soft: #3d2f24;
    --red-stamp: #a32424;
    --gold: #b8862c;
    --green: #2d7d2d;
    --shadow: rgba(26, 20, 16, 0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', sans-serif;
    background: radial-gradient(ellipse at top, #2a1f15 0%, #1a1410 100%);
    color: var(--paper);
    min-height: 100vh;
    padding: 20px;
  }

  /* ===== HEADER ===== */
  header {
    max-width: 1280px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--ink-soft);
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 30px;
    color: var(--gold);
  }
  header .subtitle {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--paper-dark);
    margin-top: 2px;
  }
  header .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  header select, header button {
    padding: 8px 14px;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--gold);
    border-radius: 3px;
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    cursor: pointer;
  }
  header select:hover, header button:hover { background: var(--ink-soft); }
  header button.primary { background: var(--gold); color: var(--ink); border-color: var(--gold); font-weight: bold; }
  header button.primary:hover { background: #d4a043; }

  /* ===== LOGIN GATE ===== */
  .login-gate {
    max-width: 460px;
    margin: 80px auto;
    background: var(--paper);
    color: var(--ink);
    padding: 36px 32px;
    border-radius: 4px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    text-align: center;
  }
  .login-gate h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 28px;
    margin-bottom: 4px;
  }
  .login-gate .sub {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--red-stamp);
    margin-bottom: 22px;
  }
  .login-gate label {
    display: block;
    text-align: left;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    margin: 14px 0 4px;
  }
  .login-gate input {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid var(--ink);
    background: white;
    color: var(--ink);
    font-family: 'Special Elite', monospace;
    font-size: 16px;
    outline: none;
  }
  .login-gate input:focus { border-color: var(--gold); }
  .login-gate button {
    width: 100%;
    padding: 12px;
    margin-top: 18px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
  }
  .login-gate button:hover { background: var(--red-stamp); }
  .login-gate .err {
    color: var(--red-stamp);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 10px;
    min-height: 16px;
  }

  /* ===== STATS ROW ===== */
  .stats-row {
    max-width: 1280px;
    margin: 0 auto 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
  }
  .stat-card {
    background: var(--ink);
    border: 1px solid var(--ink-soft);
    border-left: 3px solid var(--gold);
    padding: 16px 18px;
    border-radius: 3px;
  }
  .stat-card .label {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--paper-dark);
  }
  .stat-card .value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    color: var(--gold);
    margin-top: 4px;
    font-weight: bold;
  }
  .stat-card .value.green { color: #7dd87d; }
  .stat-card .value.red { color: #d97777; }

  /* ===== STUDENT TABLE ===== */
  .table-wrap {
    max-width: 1280px;
    margin: 0 auto;
    background: var(--ink);
    border: 1px solid var(--ink-soft);
    border-radius: 4px;
    overflow: hidden;
  }
  .table-header {
    background: #2a1f15;
    padding: 14px 18px;
    border-bottom: 1px solid var(--ink-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .table-header h3 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--gold);
  }
  .table-header .live-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #7dd87d;
  }
  .live-indicator::before {
    content: '●';
    margin-right: 4px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  thead {
    background: #2a1f15;
  }
  th {
    text-align: left;
    padding: 10px 14px;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--paper-dark);
    border-bottom: 1px solid var(--ink-soft);
  }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid #2a1f15;
  }
  tr.student-row { cursor: pointer; transition: background 0.15s; }
  tr.student-row:hover { background: #2a1f15; }
  tr.student-row.selected { background: rgba(184, 134, 44, 0.15); }

  .progress-track {
    width: 100%;
    height: 8px;
    background: #2a1f15;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold) 0%, #d4a043 100%);
    transition: width 0.4s;
  }
  .progress-fill.done {
    background: linear-gradient(90deg, #7dd87d 0%, #2d7d2d 100%);
  }
  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--paper-dark);
    margin-top: 2px;
  }
  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
  }
  .status-pill.in-progress { background: rgba(184, 134, 44, 0.2); color: var(--gold); }
  .status-pill.completed { background: rgba(125, 216, 125, 0.2); color: #7dd87d; }
  .status-pill.idle { background: rgba(217, 119, 119, 0.2); color: #d97777; }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--paper-dark);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
  }

  /* ===== DETAIL DRAWER ===== */
  .drawer-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
  }
  .drawer-backdrop.open { display: block; }
  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: min(620px, 100vw);
    height: 100vh;
    background: var(--paper);
    color: var(--ink);
    z-index: 101;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s;
    box-shadow: -10px 0 30px rgba(0,0,0,0.4);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    padding: 22px 26px;
    background: var(--ink);
    color: var(--paper);
    position: sticky; top: 0;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .drawer-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .drawer-header .meta {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--paper-dark);
  }
  .drawer-close {
    background: transparent;
    border: 1px solid var(--paper-dark);
    color: var(--paper);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
  }
  .drawer-close:hover { background: var(--red-stamp); border-color: var(--red-stamp); }

  .drawer-summary {
    padding: 18px 26px;
    background: rgba(184, 134, 44, 0.1);
    border-bottom: 1px solid var(--ink-soft);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .drawer-summary .ds {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
  }
  .drawer-summary .dv {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--ink);
    font-weight: bold;
  }

  .response-card {
    margin: 14px 22px;
    padding: 14px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 4px;
    border-left: 3px solid var(--ink-soft);
  }
  .response-card.correct { border-left-color: var(--green); }
  .response-card.incorrect { border-left-color: var(--red-stamp); }
  .response-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .response-header .rh-left {
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    color: var(--ink);
  }
  .response-header .rh-left .slot {
    background: var(--ink);
    color: var(--paper);
    padding: 2px 8px;
    margin-right: 8px;
  }
  .response-header .rh-right {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .response-body {
    display: grid;
    grid-template-columns: 1fr 100px;
    gap: 14px;
    font-size: 13px;
  }
  .response-body .answer {
    font-family: 'JetBrains Mono', monospace;
  }
  .answer .label { color: var(--ink-soft); font-size: 11px; }
  .answer .value {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .answer .value.correct { color: var(--green); }
  .answer .value.incorrect { color: var(--red-stamp); }
  .response-photo {
    width: 100px;
    height: 100px;
    border-radius: 3px;
    background: #f0f0f0;
    cursor: pointer;
    object-fit: cover;
    border: 1px solid #ddd;
  }
  .response-photo:hover { border-color: var(--gold); }
  .no-photo {
    width: 100px; height: 100px;
    background: #f0f0f0; border: 1px dashed #aaa;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #888; text-align: center;
    border-radius: 3px;
  }

  /* photo lightbox */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 4px; }
  .lightbox-close {
    position: fixed; top: 20px; right: 20px;
    background: white; border: none; width: 40px; height: 40px;
    border-radius: 50%; font-size: 18px; cursor: pointer;
  }

  @media (max-width: 700px) {
    header { flex-direction: column; align-items: flex-start; }
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5) { display: none; }
    .drawer-summary { grid-template-columns: 1fr; }
    .response-body { grid-template-columns: 1fr; }
    .response-photo, .no-photo { width: 100%; height: 200px; }
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>

<!-- ===== LOGIN GATE ===== -->
<div id="loginScreen">
  <div class="login-gate">
    <h2>Teacher Dashboard</h2>
    <div class="sub">▸ PROBABILITY HEIST · LIVE MONITORING</div>
    <label>YOUR LAST NAME</label>
    <input type="text" id="teacherName" autocomplete="family-name">
    <button onclick="teacherLogin()">SIGN IN</button>
    <div class="err" id="loginError"></div>
  </div>
</div>

<!-- ===== MAIN DASHBOARD ===== -->
<div id="dashboardScreen" style="display:none;">

  <header>
    <div>
      <h1>🐝 Probability Heist · Teacher Dashboard</h1>
      <div class="subtitle" id="teacherLabel">—</div>
    </div>
    <div class="controls">
      <select id="classSelector" onchange="onClassChange()">
        <option value="">— Select a class —</option>
      </select>
      <button onclick="exportCSV()" class="primary">⬇ EXPORT CSV</button>
      <button onclick="signOut()">SIGN OUT</button>
    </div>
  </header>

  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-card">
      <div class="label">STUDENTS LOGGED IN</div>
      <div class="value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="label">COMPLETED</div>
      <div class="value green" id="statCompleted">0</div>
    </div>
    <div class="stat-card">
      <div class="label">IN PROGRESS</div>
      <div class="value" id="statInProgress">0</div>
    </div>
    <div class="stat-card">
      <div class="label">CLASS AVERAGE</div>
      <div class="value" id="statAvg">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h3 id="classTitle">Select a class to begin</h3>
      <span class="live-indicator" id="liveIndicator" style="display:none;">LIVE</span>
    </div>
    <table id="studentsTable" style="display:none;">
      <thead>
        <tr>
          <th>Detective</th>
          <th>Progress</th>
          <th>Status</th>
          <th>Last Active</th>
          <th>Started</th>
        </tr>
      </thead>
      <tbody id="studentsTbody"></tbody>
    </table>
    <div class="empty-state" id="emptyState">No class selected. Pick one from the dropdown above.</div>
  </div>

</div>

<!-- ===== STUDENT DETAIL DRAWER ===== -->
<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <h2 id="drawerName">—</h2>
      <div class="meta" id="drawerMeta">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-summary" id="drawerSummary"></div>
  <div id="drawerResponses"></div>
</div>

<!-- ===== PHOTO LIGHTBOX ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="">
</div>

<script>
  // ========================================================================
  // FIREBASE INIT (same project as student app)
  // ========================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyCzhgBGCCeB_wJdHgVqh2lAwqT4R2g0rKQ",
    authDomain: "greiner-math-assessment.firebaseapp.com",
    databaseURL: "https://greiner-math-assessment-default-rtdb.firebaseio.com",
    projectId: "greiner-math-assessment",
    storageBucket: "greiner-math-assessment.firebasestorage.app",
    messagingSenderId: "942290233729",
    appId: "1:942290233729:web:660abe78f902e94c702080"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const ASSESSMENT_KEY = "probability_heist";
  const TOTAL_CLUES = 15;

  // ========================================================================
  // STATE
  // ========================================================================
  let teacherName = null;
  let myClasses = {};         // { code: { teacher, period, createdAt } }
  let activeClassCode = null;
  let activeStudents = {};    // { studentId: studentData }
  let studentsListener = null;

  // ========================================================================
  // CLUE ↔ SLOT MAP (mirrors student app)
  // ========================================================================
  const CLUE_MAP = {
    1:  { letter: 'E', char: 'C', title: 'The Pizzeria Alibi',          teks: '7.6(A)' },
    2:  { letter: 'C', char: 'R', title: 'The Carnival Spinner',        teks: '7.6(D)' },
    3:  { letter: 'I', char: 'A', title: 'The Carnival Spinner II',     teks: '7.6(D)' },
    4:  { letter: 'L', char: 'C', title: 'The Marked Deck',             teks: '7.6(D)' },
    5:  { letter: 'G', char: 'K', title: 'The Ice-Cream Parlor',        teks: '7.6(H)' },
    6:  { letter: 'N', char: 'E', title: "The Grocer's Ledger",         teks: '7.6(H)' },
    7:  { letter: 'B', char: 'D', title: 'The Library Card Trail',      teks: '7.6(H)' },
    8:  { letter: 'K', char: 'T', title: 'The Pet Shop Witness',        teks: '7.6(H)' },
    9:  { letter: 'F', char: 'H', title: 'The Spinner of Shapes',       teks: '7.6(H)' },
    10: { letter: 'O', char: 'E', title: 'The Basketball Records',      teks: '7.6(H)' },
    11: { letter: 'H', char: 'C', title: 'The Box of Keys',             teks: '7.6(I)' },
    12: { letter: 'M', char: 'A', title: 'The Compound Card Trick',     teks: '7.6(I)' },
    13: { letter: 'A', char: 'S', title: 'The Twin Spinners',           teks: '7.6(I)' },
    14: { letter: 'D', char: 'E', title: 'The 8-Faced Solid',           teks: '7.6(I)' },
    15: { letter: 'J', char: '!', title: 'The Deli Counter',            teks: '7.6(I)' }
  };

  // ========================================================================
  // LOGIN
  // ========================================================================
  function teacherLogin() {
    const name = document.getElementById('teacherName').value.trim();
    const errEl = document.getElementById('loginError');
    if (!name) {
      errEl.textContent = "Enter your last name to continue.";
      return;
    }
    teacherName = name;
    localStorage.setItem('probHeistTeacher', name);
    loadTeacherClasses();
  }

  function signOut() {
    localStorage.removeItem('probHeistTeacher');
    detachStudentsListener();
    location.reload();
  }

  function loadTeacherClasses() {
    db.ref(`${ASSESSMENT_KEY}/classes`).once('value').then(snap => {
      const all = snap.val() || {};
      myClasses = {};
      Object.entries(all).forEach(([code, c]) => {
        if ((c.teacher || "").toLowerCase() === teacherName.toLowerCase()) {
          myClasses[code] = c;
        }
      });
      if (Object.keys(myClasses).length === 0) {
        document.getElementById('loginError').textContent =
          `No classes found for "${teacherName}". Generate a code in the setup tool first.`;
        teacherName = null;
        localStorage.removeItem('probHeistTeacher');
        return;
      }
      enterDashboard();
    }).catch(err => {
      document.getElementById('loginError').textContent = "Connection error. Try again.";
      console.error(err);
    });
  }

  function enterDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboardScreen').style.display = 'block';
    document.getElementById('teacherLabel').textContent =
      `Signed in as ${teacherName} · ${Object.keys(myClasses).length} active class${Object.keys(myClasses).length===1?'':'es'}`;
    populateClassSelector();
  }

  function populateClassSelector() {
    const sel = document.getElementById('classSelector');
    sel.innerHTML = '<option value="">— Select a class —</option>';
    const sorted = Object.entries(myClasses).sort((a,b) => {
      // sort by period block label
      return (a[1].period || "").localeCompare(b[1].period || "");
    });
    sorted.forEach(([code, c]) => {
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = `Periods ${c.period} (${code})`;
      sel.appendChild(opt);
    });
  }

  // Auto-resume teacher session
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('probHeistTeacher');
    if (saved) {
      teacherName = saved;
      document.getElementById('teacherName').value = saved;
      loadTeacherClasses();
    }
  });

  // ========================================================================
  // CLASS MONITORING (live listener)
  // ========================================================================
  function onClassChange() {
    const code = document.getElementById('classSelector').value;
    if (!code) {
      detachStudentsListener();
      document.getElementById('classTitle').textContent = "Select a class to begin";
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('studentsTable').style.display = 'none';
      document.getElementById('statsRow').style.display = 'none';
      document.getElementById('liveIndicator').style.display = 'none';
      activeClassCode = null;
      return;
    }
    activeClassCode = code;
    const c = myClasses[code];
    document.getElementById('classTitle').textContent =
      `Periods ${c.period} · Code ${code}`;
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('studentsTable').style.display = 'table';
    document.getElementById('statsRow').style.display = 'grid';
    document.getElementById('liveIndicator').style.display = 'inline';
    attachStudentsListener();
  }

  function attachStudentsListener() {
    detachStudentsListener();
    studentsListener = db.ref(`${ASSESSMENT_KEY}/students`)
      .orderByChild('classCode')
      .equalTo(activeClassCode);
    studentsListener.on('value', snap => {
      activeStudents = snap.val() || {};
      renderStudents();
    });
  }

  function detachStudentsListener() {
    if (studentsListener) {
      studentsListener.off();
      studentsListener = null;
    }
    activeStudents = {};
  }

  // ========================================================================
  // RENDER STUDENT TABLE
  // ========================================================================
  function renderStudents() {
    const tbody = document.getElementById('studentsTbody');
    tbody.innerHTML = '';
    const list = Object.entries(activeStudents).map(([id, s]) => ({ id, ...s }));
    list.sort((a, b) => {
      // sort by lastName, firstName
      const ln = (a.lastName || "").localeCompare(b.lastName || "");
      return ln !== 0 ? ln : (a.firstName || "").localeCompare(b.firstName || "");
    });

    if (list.length === 0) {
      const row = document.createElement('tr');
      row.innerHTML = '<td colspan="5" style="text-align:center;color:var(--paper-dark);padding:30px;font-style:italic;">No students have logged in yet for this class.</td>';
      tbody.appendChild(row);
      updateStats(list);
      return;
    }

    list.forEach(s => {
      const solved = s.solvedCount || 0;
      const pct = (solved / TOTAL_CLUES * 100).toFixed(0);
      const row = document.createElement('tr');
      row.className = 'student-row';
      row.dataset.id = s.id;
      row.onclick = () => openDrawer(s.id);

      const lastActiveStr = formatRelativeTime(s.lastActive);
      const startedStr = formatTime(s.startedAt);
      const idle = isIdle(s.lastActive);
      const status = s.status === 'completed' ? 'completed' : (idle ? 'idle' : 'in-progress');
      const statusLabel = s.status === 'completed' ? 'COMPLETED' : (idle ? 'IDLE' : 'IN PROGRESS');

      row.innerHTML = `
        <td><strong>${escapeHtml(s.firstName)} ${escapeHtml(s.lastName)}</strong></td>
        <td>
          <div class="progress-track">
            <div class="progress-fill ${solved === TOTAL_CLUES ? 'done' : ''}" style="width:${pct}%"></div>
          </div>
          <div class="progress-text">${solved} / ${TOTAL_CLUES} clues</div>
        </td>
        <td><span class="status-pill ${status}">${statusLabel}</span></td>
        <td style="font-family:monospace;font-size:12px;color:var(--paper-dark);">${lastActiveStr}</td>
        <td style="font-family:monospace;font-size:12px;color:var(--paper-dark);">${startedStr}</td>
      `;
      tbody.appendChild(row);
    });

    updateStats(list);
  }

  function updateStats(list) {
    const total = list.length;
    const completed = list.filter(s => s.status === 'completed').length;
    const inProgress = total - completed;
    const avg = total === 0 ? '—'
      : (list.reduce((sum, s) => sum + (s.solvedCount || 0), 0) / total).toFixed(1) + ' / 15';
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statCompleted').textContent = completed;
    document.getElementById('statInProgress').textContent = inProgress;
    document.getElementById('statAvg').textContent = avg;
  }

  // ========================================================================
  // STUDENT DETAIL DRAWER
  // ========================================================================
  function openDrawer(studentId) {
    const s = activeStudents[studentId];
    if (!s) return;

    // highlight selected row
    document.querySelectorAll('tr.student-row').forEach(r => r.classList.remove('selected'));
    const row = document.querySelector(`tr.student-row[data-id="${studentId}"]`);
    if (row) row.classList.add('selected');

    document.getElementById('drawerName').textContent =
      `${s.firstName} ${s.lastName}`;
    document.getElementById('drawerMeta').textContent =
      `Class ${s.classCode} · Started ${formatTime(s.startedAt)}`;

    const responses = s.responses || {};
    let totalAttempts = 0;
    let firstTryCount = 0;
    Object.values(responses).forEach(r => {
      if (r.attempts) totalAttempts += r.attempts;
      if (r.correct && r.attempts === 1) firstTryCount += 1;
    });

    const summary = document.getElementById('drawerSummary');
    summary.innerHTML = `
      <div>
        <div class="ds">SOLVED</div>
        <div class="dv">${s.solvedCount || 0} / 15</div>
      </div>
      <div>
        <div class="ds">FIRST-TRY CORRECT</div>
        <div class="dv">${firstTryCount}</div>
      </div>
      <div>
        <div class="ds">TOTAL ATTEMPTS</div>
        <div class="dv">${totalAttempts}</div>
      </div>
    `;

    // Render all 15 clue slots in order
    const respDiv = document.getElementById('drawerResponses');
    respDiv.innerHTML = '';
    for (let pos = 1; pos <= TOTAL_CLUES; pos++) {
      const r = responses[pos];
      const meta = CLUE_MAP[pos];
      const card = document.createElement('div');
      const status = r ? (r.correct ? 'correct' : 'incorrect') : 'pending';
      card.className = `response-card ${status}`;

      const photoHtml = (r && r.photoUrl)
        ? `<img class="response-photo" src="${r.photoUrl}" onclick="openLightbox('${r.photoUrl}')" alt="Student work">`
        : `<div class="no-photo">no photo</div>`;

      const answerHtml = r
        ? `<div class="answer">
             <div class="label">Submitted answer</div>
             <div class="value ${r.correct ? 'correct' : 'incorrect'}">${escapeHtml(String(r.submittedAnswer || ''))}</div>
             <div class="label">${r.correct ? `✓ Correct on attempt ${r.attempts}` : `✗ Incorrect (attempts: ${r.attempts || 1})`}</div>
             <div class="label" style="margin-top:6px;">${formatTime(r.timestamp)}</div>
           </div>`
        : `<div class="answer">
             <div class="label">Not yet attempted</div>
           </div>`;

      card.innerHTML = `
        <div class="response-header">
          <div class="rh-left"><span class="slot">SLOT ${pos}</span>${escapeHtml(meta.title)}</div>
          <div class="rh-right">${meta.teks} · Letter ${meta.char === '!' ? '!' : meta.char}</div>
        </div>
        <div class="response-body">
          ${answerHtml}
          ${photoHtml}
        </div>
      `;
      respDiv.appendChild(card);
    }

    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerBackdrop').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerBackdrop').classList.remove('open');
    document.querySelectorAll('tr.student-row').forEach(r => r.classList.remove('selected'));
  }

  // ========================================================================
  // PHOTO LIGHTBOX
  // ========================================================================
  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
    event.stopPropagation();
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  // ========================================================================
  // CSV EXPORT
  // ========================================================================
  function exportCSV() {
    if (!activeClassCode) {
      alert("Select a class first.");
      return;
    }
    const list = Object.values(activeStudents);
    if (list.length === 0) {
      alert("No students to export yet for this class.");
      return;
    }
    list.sort((a, b) => (a.lastName || "").localeCompare(b.lastName || ""));

    // Header
    const headers = [
      'Last Name', 'First Name', 'Class Code', 'Solved', 'Total',
      'Score (%)', 'Status', 'Started', 'Last Active', 'Total Attempts'
    ];
    for (let i = 1; i <= TOTAL_CLUES; i++) {
      headers.push(`Slot ${i} Answer`, `Slot ${i} Correct`, `Slot ${i} Attempts`);
    }

    const rows = [headers];
    list.forEach(s => {
      const solved = s.solvedCount || 0;
      const score = ((solved / TOTAL_CLUES) * 100).toFixed(1);
      const responses = s.responses || {};
      let totalAttempts = 0;
      Object.values(responses).forEach(r => { if (r.attempts) totalAttempts += r.attempts; });

      const row = [
        s.lastName, s.firstName, s.classCode,
        solved, TOTAL_CLUES, score,
        s.status || 'in-progress',
        formatTime(s.startedAt),
        formatTime(s.lastActive),
        totalAttempts
      ];
      for (let i = 1; i <= TOTAL_CLUES; i++) {
        const r = responses[i] || {};
        row.push(r.submittedAnswer || '', r.correct ? 'Yes' : (r.submittedAnswer ? 'No' : ''), r.attempts || 0);
      }
      rows.push(row);
    });

    const csv = rows.map(r => r.map(cellToCsv).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    const c = myClasses[activeClassCode];
    const date = new Date().toISOString().slice(0, 10);
    a.href = URL.createObjectURL(blob);
    a.download = `ProbabilityHeist_${teacherName}_P${c.period}_${date}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function cellToCsv(v) {
    const s = String(v == null ? '' : v);
    if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  }

  // ========================================================================
  // HELPERS
  // ========================================================================
  function formatTime(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleString('en-US', {
      month: 'numeric', day: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    });
  }

  function formatRelativeTime(ts) {
    if (!ts) return '—';
    const diff = Date.now() - ts;
    if (diff < 60_000) return 'just now';
    if (diff < 3600_000) return `${Math.floor(diff/60000)}m ago`;
    if (diff < 86400_000) return `${Math.floor(diff/3600000)}h ago`;
    return formatTime(ts);
  }

  function isIdle(ts) {
    if (!ts) return false;
    return (Date.now() - ts) > 5 * 60_000;  // > 5 min = idle
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // Re-render every 30s so "last active" timestamps refresh & idle status updates
  setInterval(() => {
    if (activeClassCode && Object.keys(activeStudents).length > 0) renderStudents();
  }, 30000);
</script>
